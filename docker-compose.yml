services:
  # ---- MinIO (S3-compatible object storage) ----
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  # ---- Go backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      S3_ENDPOINT: "minio:9000"
      # Externally reachable base URL used in returned presigned links.
      # Set this in your .env, e.g. https://s3.example.com
      S3_PUBLIC_URL: "${S3_PUBLIC_URL:-}"
      # Public base URL of the Kipup web entry used to build shareable proxy links.
      # Set this in your .env, e.g. http://47.88.100.1:3000 or https://kipup.example.com
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_REGION: "${S3_REGION:-us-east-1}"
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

  # ---- Vue frontend (served by nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  minio_data:
